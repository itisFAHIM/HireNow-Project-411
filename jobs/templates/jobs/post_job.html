{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>HireNow - Post a Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'job_list' %}"><i class="bi bi-briefcase-fill me-2"></i>HireNow Employer</a>
            <a href="{% url 'job_list' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Back to Board</a>
        </div>
    </nav>

    <div class="container text-start pb-5">
        <div class="card shadow border-0 mx-auto" style="max-width: 600px; border-radius: 12px;">
            <div class="card-header bg-primary text-white py-3" style="border-radius: 12px 12px 0 0;">
                <h3 class="mb-0 fw-bold"><i class="bi bi-file-earmark-plus-fill me-2"></i>Post a New Job</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Job Title</label>
                        <input type="text" name="title" class="form-control form-control-lg bg-light" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Company Name</label>
                            <input type="text" name="company" class="form-control bg-light" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Salary Offering</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">$</span>
                                <input type="text" name="salary" class="form-control bg-light" required>
                            </div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Job Description</label>
                        <textarea name="description" class="form-control bg-light" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Publish Job</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
