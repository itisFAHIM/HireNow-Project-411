<!DOCTYPE html>
<html>
<head>
    <title>Apply for {{ job.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Apply for: {{ job.title }}</h2>
        <h5 class="text-muted">{{ job.company }}</h5>
        
        <form method="POST" enctype="multipart/form-data" class="card p-4 shadow-sm mt-4">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Your Full Name</label>
                <input type="text" name="applicant_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Upload Resume (PDF/Doc)</label>
                <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx" required>
            </div>
            <button type="submit" class="btn btn-success">Submit Application</button>
        </form>
    </div>
</body>
</html>
