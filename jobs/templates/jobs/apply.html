{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Apply for {{ job.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'job_list' %}"><i class="bi bi-briefcase-fill me-2"></i>HireNow</a>
            <a href="{% url 'job_list' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Cancel Application</a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="card shadow-lg border-0 mx-auto overflow-hidden" style="max-width: 550px; border-radius: 16px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <span class="badge bg-primary text-white mb-2 py-2 px-3 rounded-pill">Application Portal</span>
                    <h2 class="fw-bold text-dark">{{ job.title }}</h2>
                    <h5 class="text-secondary"><i class="bi bi-building me-2"></i>{{ job.company }}</h5>
                </div>
                
                <hr class="text-muted mb-4">
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark">Your Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="applicant_name" class="form-control bg-light border-start-0" placeholder="e.g. John Doe" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark">Upload Resume (PDF/Doc)</label>
                        <input type="file" name="resume" class="form-control form-control-lg border-primary shadow-sm" accept=".pdf,.doc,.docx" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow">
                        <i class="bi bi-check2-circle me-2"></i>Submit Application
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
