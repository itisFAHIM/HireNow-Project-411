<!DOCTYPE html>
<html>
<head>
    <title>HireNow - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center py-5">
    <div class="container text-center">
        <div class="card shadow p-4 mx-auto text-start" style="max-width: 500px;">
            <h3 class="mb-4 text-center text-primary">Join HireNow</h3>
            
            <form method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        
                        {% if field.help_text %}
                            <div class="form-text text-muted small mt-1">
                                {{ field.help_text|safe }}
                            </div>
                        {% endif %}
                        
                        {% for error in field.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-primary w-100 mt-4 fs-5">Sign Up</button>
            </form>
            
            <p class="mt-4 text-center">Already have an account? <a href="{% url 'login' %}">Log In</a></p>
        </div>
    </div>
</body>
</html>
