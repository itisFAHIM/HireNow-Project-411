{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Profile - HireNow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'job_list' %}"><i class="bi bi-briefcase-fill me-2"></i>HireNow</a>
            <a href="{% url 'job_list' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Back to Board</a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="card shadow-lg border-0 mx-auto" style="max-width: 500px; border-radius: 16px;">
            <div class="card-body text-center p-5">
                
                <!-- Display Avatar -->
                <div class="mb-4">
                    {% if user.profile_pic %}
                        <img src="{{ user.profile_pic.url }}" alt="Profile Picture" class="rounded-circle shadow" style="width: 150px; height: 150px; object-fit: cover; border: 4px solid #0d6efd;">
                    {% else %}
                        <!-- Fallback Icon if no picture is uploaded -->
                        <div class="bg-light rounded-circle mx-auto d-flex align-items-center justify-content-center border" style="width: 150px; height: 150px;">
                            <i class="bi bi-person text-secondary" style="font-size: 5rem;"></i>
                        </div>
                    {% endif %}
                </div>

                <h2 class="fw-bold text-dark">{{ user.username }}</h2>
                <span class="badge bg-primary px-3 py-2 mb-4">{{ user.get_role_display|default:user.role|title }} Account</span>

                <hr class="text-muted mb-4">

                <!-- Upload Form -->
                <form method="POST" enctype="multipart/form-data" class="text-start">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Update Profile Picture</label>
                        <input class="form-control" type="file" name="profile_pic" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold"><i class="bi bi-cloud-upload me-2"></i>Upload New Avatar</button>
                </form>
                
            </div>
        </div>
    </div>
</body>
</html>
